```yaml
name: AI PR Reviewer v5 (gpt-5.3-chat + Multi-Agent + Execution)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  LITELLM_BASE_URL: https://cohort-xero.duckdns.org/litellm/v1
  MODEL_NAME: gpt-5.3-chat
  MAX_RETRIES: 2
  MAX_TOOL_ROUNDS: 30
  IGNORE_PATTERNS: "*.lock,*.min.js,*.min.css,*.map,*.generated.*,package-lock.json,yarn.lock,pnpm-lock.yaml,*.pb.go,*.svg,*.png,*.jpg,*.ico,*.woff*,*.ttf,*.eot"
  PROTECTED_PATTERNS: "*.lock,*.min.js,package-lock.json,yarn.lock,pnpm-lock.yaml,*.generated.*,*.pb.go"

jobs:
  ai-pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ──────────────────────────────────────────────
      # 1. Setup
      # ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip + review memory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            .ai-review-memory/
          key: ${{ runner.os }}-reviewer-v5-${{ github.repository }}

      - name: Install dependencies
        run: |
          pip install openai==1.60.0 requests==2.31.0

          # Detect project and install its deps so we can actually run tests/linters
          if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt 2>/dev/null || true
          elif [ -f "pyproject.toml" ]; then
              pip install -e ".[dev,test]" 2>/dev/null || pip install -e . 2>/dev/null || true
          elif [ -f "setup.py" ]; then
              pip install -e ".[dev,test]" 2>/dev/null || pip install -e . 2>/dev/null || true
          fi

          if [ -f "package.json" ]; then
              which npm && npm ci --ignore-scripts 2>/dev/null || true
          fi

          if [ -f "go.mod" ]; then
              which go && go mod download 2>/dev/null || true
          fi

      # ──────────────────────────────────────────────
      # 2. Gather seed context
      # ──────────────────────────────────────────────
      - name: Gather PR Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/review

          gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json title,body,baseRefName,headRefName,files,labels,comments,reviews,assignees,milestone \
            > /tmp/review/pr_meta.json

          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/review/pr_diff.txt || true
          gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path' > /tmp/review/changed_files.txt

          # Existing reviews and comments (human + bot)
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" --paginate > /tmp/review/inline_comments.json 2>/dev/null || echo "[]" > /tmp/review/inline_comments.json
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate > /tmp/review/pr_comments.json 2>/dev/null || echo "[]" > /tmp/review/pr_comments.json
          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate > /tmp/review/reviews.json 2>/dev/null || echo "[]" > /tmp/review/reviews.json

          # Get the diff hunk mapping (needed for valid inline comments)
          gh api "repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" --paginate > /tmp/review/pr_files_api.json

      - name: Build Repo Index and Detect Stack
        run: |
          python3 << 'PYEOF'
          import os, json, fnmatch, subprocess, glob, re

          ignore = os.environ.get("IGNORE_PATTERNS", "").split(",")

          # ── Index all files ──
          repo_files = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith(".") and d not in [
                  "node_modules", "__pycache__", ".git", "dist", "build", "vendor",
                  ".next", ".nuxt", "coverage", ".tox", ".mypy_cache", "venv", "env",
                  ".venv", "target", "bin", "obj", ".ai-review-memory"
              ]]
              for f in files:
                  repo_files.append(os.path.relpath(os.path.join(root, f), "."))

          # ── Filter changed files ──
          with open("/tmp/review/changed_files.txt") as f:
              all_changed = [l.strip() for l in f if l.strip()]

          review_files, skipped_files = [], []
          for fp in all_changed:
              if any(fnmatch.fnmatch(fp, p.strip()) for p in ignore if p.strip()):
                  skipped_files.append(fp)
              else:
                  review_files.append(fp)

          # ── Build tree ──
          tree = {}
          for fp in sorted(repo_files):
              parts = fp.split("/")
              d = tree
              for part in parts[:-1]:
                  d = d.setdefault(part, {})
              d[parts[-1]] = None

          def render_tree(d, prefix="", max_depth=4, depth=0):
              lines = []
              for i, (name, sub) in enumerate(sorted(d.items())):
                  last = i == len(d) - 1
                  conn = "└── " if last else "├── "
                  if sub is None:
                      lines.append(f"{prefix}{conn}{name}")
                  else:
                      count = sum(1 for _ in _c(sub))
                      if depth >= max_depth:
                          lines.append(f"{prefix}{conn}{name}/ ({count} files)")
                      else:
                          lines.append(f"{prefix}{conn}{name}/")
                          lines.extend(render_tree(sub, prefix + ("    " if last else "│   "), max_depth, depth+1))
              return lines
          def _c(d):
              for v in d.values():
                  if v is None: yield 1
                  else: yield from _c(v)

          tree_str = "\n".join(render_tree(tree)[:1000])

          # ── Detect project stack ──
          stack = {"languages": set(), "frameworks": set(), "test_runners": set(),
                   "linters": set(), "package_managers": set(), "ci": set()}

          # Language detection by extension frequency
          exts = {}
          for f in repo_files:
              ext = os.path.splitext(f)[1]
              exts[ext] = exts.get(ext, 0) + 1

          ext_map = {".py": "python", ".ts": "typescript", ".tsx": "typescript", ".js": "javascript",
                     ".jsx": "javascript", ".go": "go", ".rs": "rust", ".java": "java", ".rb": "ruby",
                     ".cs": "csharp", ".cpp": "cpp", ".c": "c", ".swift": "swift", ".kt": "kotlin"}
          for ext, lang in ext_map.items():
              if exts.get(ext, 0) > 0:
                  stack["languages"].add(lang)

          # Framework detection
          configs = {f for f in repo_files if "/" not in f or f.count("/") <= 1}
          config_content = {}
          for cf in ["package.json", "pyproject.toml", "setup.cfg", "go.mod", "Cargo.toml",
                      "Gemfile", "pom.xml", "build.gradle", "requirements.txt"]:
              if cf in repo_files:
                  try:
                      with open(cf, errors="ignore") as fh:
                          config_content[cf] = fh.read(20000)
                  except: pass

          pkg = config_content.get("package.json", "")
          if "react" in pkg: stack["frameworks"].add("react")
          if "next" in pkg: stack["frameworks"].add("nextjs")
          if "vue" in pkg: stack["frameworks"].add("vue")
          if "express" in pkg: stack["frameworks"].add("express")
          if "jest" in pkg: stack["test_runners"].add("jest")
          if "vitest" in pkg: stack["test_runners"].add("vitest")
          if "mocha" in pkg: stack["test_runners"].add("mocha")
          if "eslint" in pkg: stack["linters"].add("eslint")
          if "prettier" in pkg: stack["linters"].add("prettier")

          pyproj = config_content.get("pyproject.toml", "")
          if "django" in pyproj or any("django" in f for f in repo_files): stack["frameworks"].add("django")
          if "fastapi" in pyproj or any("fastapi" in f for f in repo_files): stack["frameworks"].add("fastapi")
          if "flask" in pyproj: stack["frameworks"].add("flask")
          if "pytest" in pyproj: stack["test_runners"].add("pytest")
          if "ruff" in pyproj: stack["linters"].add("ruff")
          if "mypy" in pyproj: stack["linters"].add("mypy")
          if "black" in pyproj: stack["linters"].add("black")

          if "conftest.py" in repo_files or any("conftest.py" in f for f in repo_files):
              stack["test_runners"].add("pytest")

          # Test run commands
          test_commands = []
          if "pytest" in stack["test_runners"]:
              test_commands.append("python -m pytest --tb=short -q")
          if "jest" in stack["test_runners"]:
              test_commands.append("npx jest --bail")
          if "vitest" in stack["test_runners"]:
              test_commands.append("npx vitest run")
          if "go" in stack["languages"]:
              test_commands.append("go test ./...")
              stack["test_runners"].add("go test")

          # Lint commands
          lint_commands = []
          if "python" in stack["languages"]:
              if "ruff" in stack["linters"]:
                  lint_commands.append("ruff check .")
              lint_commands.append("python -m py_compile")  # always available
          if "eslint" in stack["linters"]:
              lint_commands.append("npx eslint --no-error-on-unmatched-pattern .")
          if "mypy" in stack["linters"]:
              lint_commands.append("mypy --ignore-missing-imports .")

          stack_serializable = {k: sorted(v) for k, v in stack.items()}
          stack_serializable["test_commands"] = test_commands
          stack_serializable["lint_commands"] = lint_commands

          # ── Parse existing human comments ──
          human_comments = []
          try:
              with open("/tmp/review/inline_comments.json") as f:
                  for c in json.load(f):
                      if c.get("user", {}).get("login") != "github-actions[bot]":
                          human_comments.append({
                              "file": c.get("path", ""),
                              "line": c.get("line") or c.get("original_line"),
                              "body": c.get("body", "")[:300],
                              "author": c.get("user", {}).get("login", ""),
                          })
          except: pass

          # ── Parse diff hunk positions (for valid inline comments) ──
          diff_positions = {}  # {file: {new_line: position}}
          try:
              with open("/tmp/review/pr_files_api.json") as f:
                  pr_files = json.load(f)
                  if isinstance(pr_files, list):
                      files_list = pr_files
                  else:
                      files_list = pr_files  # paginated might be flat list

              for pf in files_list:
                  fname = pf.get("filename", "")
                  patch = pf.get("patch", "")
                  if not patch:
                      continue

                  positions = {}
                  position = 0
                  current_new_line = None

                  for line in patch.split("\n"):
                      position += 1
                      if line.startswith("@@"):
                          m = re.search(r'\+(\d+)', line)
                          if m:
                              current_new_line = int(m.group(1)) - 1  # -1 because next line starts
                      elif current_new_line is not None:
                          if not line.startswith("-"):
                              current_new_line += 1
                              positions[current_new_line] = position
                          # Lines starting with - don't increment new line number

                  diff_positions[fname] = positions
          except Exception as e:
              print(f"Warning: could not parse diff positions: {e}")

          # ── Load review memory (patterns from previous reviews) ──
          memory = {"patterns": [], "conventions": [], "common_issues": []}
          memory_file = ".ai-review-memory/memory.json"
          if os.path.isfile(memory_file):
              try:
                  with open(memory_file) as f:
                      memory = json.load(f)
                  print(f"Loaded review memory: {len(memory.get('patterns', []))} patterns, "
                        f"{len(memory.get('conventions', []))} conventions")
              except: pass

          # Save everything
          for name, data in [
              ("repo_files.json", repo_files),
              ("review_files.json", review_files),
              ("skipped_files.json", skipped_files),
              ("stack.json", stack_serializable),
              ("human_comments.json", human_comments),
              ("diff_positions.json", diff_positions),
              ("memory.json", memory),
          ]:
              with open(f"/tmp/review/{name}", "w") as f:
                  json.dump(data, f, indent=2 if name != "repo_files.json" else None)

          with open("/tmp/review/repo_tree.txt", "w") as f:
              f.write(tree_str)

          print(f"Repo: {len(repo_files)} files | Review: {len(review_files)} | Skipped: {len(skipped_files)}")
          print(f"Stack: {stack_serializable}")
          print(f"Test commands: {test_commands}")
          print(f"Diff positions mapped for {len(diff_positions)} files")
          PYEOF

      # ──────────────────────────────────────────────
      # 3. Dismiss stale bot comments
      # ──────────────────────────────────────────────
      - name: Dismiss stale bot comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Minimize old summary comments
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq \
            '.[] | select(.user.login == "github-actions[bot]") | select(.body | startswith("## 🤖 AI Review")) | .id' \
          | while read -r cid; do
              gh api graphql -f query="mutation { minimizeComment(input: {subjectId: \"$cid\", classifier: OUTDATED}) { minimizedComment { isMinimized } } }" 2>/dev/null || true
          done

          # Dismiss old bot reviews
          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate --jq \
            '.[] | select(.user.login == "github-actions[bot]") | select(.state != "DISMISSED") | .id' \
          | while read -r rid; do
              gh api -X PUT "repos/$REPO/pulls/$PR_NUMBER/reviews/$rid/dismissals" \
                -f message="Superseded by new review." 2>/dev/null || true
          done

      # ──────────────────────────────────────────────
      # 4. Multi-agent review
      # ──────────────────────────────────────────────
      - name: "Multi-Agent Review"
        id: ai-agent
        env:
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, subprocess, fnmatch, tempfile, re, shlex
          from pathlib import Path
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["LITELLM_MASTER_KEY"],
              base_url=os.environ["LITELLM_BASE_URL"],
          )
          MODEL        = os.environ["MODEL_NAME"]
          MAX_RETRIES  = int(os.environ["MAX_RETRIES"])
          MAX_ROUNDS   = int(os.environ["MAX_TOOL_ROUNDS"])
          PROTECTED    = [p.strip() for p in os.environ.get("PROTECTED_PATTERNS", "").split(",") if p.strip()]
          REPO         = os.environ["REPO"]
          PR_NUMBER    = os.environ["PR_NUMBER"]
          HEAD_SHA     = os.environ["HEAD_SHA"]

          # Load all context
          def load_json(path, default=None):
              try:
                  with open(path) as f: return json.load(f)
              except: return default if default is not None else {}

          repo_files     = set(load_json("/tmp/review/repo_files.json", []))
          review_files   = load_json("/tmp/review/review_files.json", [])
          skipped_files  = load_json("/tmp/review/skipped_files.json", [])
          stack          = load_json("/tmp/review/stack.json", {})
          pr_meta        = load_json("/tmp/review/pr_meta.json")
          human_comments = load_json("/tmp/review/human_comments.json", [])
          diff_positions = load_json("/tmp/review/diff_positions.json", {})
          memory         = load_json("/tmp/review/memory.json", {})

          with open("/tmp/review/pr_diff.txt") as f:
              pr_diff = f.read()

          pr_title = pr_meta.get("title", "")
          pr_body  = pr_meta.get("body", "") or ""

          # ═══════════════════════════════════════════
          # Shared tool implementations
          # ═══════════════════════════════════════════

          review_issues  = []
          applied_fixes  = []
          execution_log  = []

          def tool_read_file(path, start_line=None, end_line=None):
              if path not in repo_files:
                  matches = sorted([f for f in repo_files if path in f])[:8]
                  if matches:
                      return f"Not found: '{path}'. Did you mean:\n" + "\n".join(f"  - {m}" for m in matches)
                  return f"Not found: '{path}'"
              try:
                  with open(path, "r", errors="ignore") as f:
                      lines = f.readlines()
                  total = len(lines)
                  s = max(0, (start_line or 1) - 1)
                  e = min(total, end_line or total)
                  numbered = [f"{i:4d} | {l.rstrip()}" for i, l in enumerate(lines[s:e], start=s+1)]
                  content = "\n".join(numbered)
                  if len(content) > 60000:
                      content = content[:60000] + "\n... [truncated]"
                  return f"File: {path} ({total} lines, showing {s+1}-{e})\n\n{content}"
              except Exception as e:
                  return f"Error: {e}"

          def tool_search_codebase(pattern, file_glob=None, max_results=10):
              try:
                  cmd = ["grep", "-rn", "-E", pattern, "."]
                  if file_glob:
                      cmd = ["grep", "-rn", f"--include={file_glob}", "-E", pattern, "."]
                  else:
                      cmd.extend(["--include=*.py", "--include=*.ts", "--include=*.tsx",
                                  "--include=*.js", "--include=*.jsx", "--include=*.go",
                                  "--include=*.java", "--include=*.rs", "--include=*.rb",
                                  "--include=*.yaml", "--include=*.yml", "--include=*.json",
                                  "--include=*.toml", "--include=*.sql", "--include=*.graphql",
                                  "--include=*.sh", "--include=*.md", "--include=*.html"])
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  raw = [l for l in result.stdout.strip().split("\n") if l and not any(
                      s in l for s in ["node_modules/", "__pycache__/", ".git/", "dist/", ".min."])]
                  if not raw:
                      return f"No matches for '{pattern}'" + (f" in {file_glob}" if file_glob else "")
                  by_file = {}
                  for line in raw:
                      parts = line.split(":", 2)
                      if len(parts) >= 3:
                          fp = parts[0].lstrip("./")
                          by_file.setdefault(fp, []).append(f"  L{parts[1]}: {parts[2].strip()}")
                  out = f"Matches in {len(by_file)} file(s):\n\n"
                  for fp, matches in list(by_file.items())[:max_results]:
                      out += f"📄 {fp}:\n" + "\n".join(matches[:10]) + "\n"
                      if len(matches) > 10: out += f"  ... +{len(matches)-10} more\n"
                      out += "\n"
                  if len(by_file) > max_results: out += f"... +{len(by_file)-max_results} more files"
                  return out
              except subprocess.TimeoutExpired:
                  return "Search timed out."
              except Exception as e:
                  return f"Error: {e}"

          def tool_list_directory(path, recursive=False):
              if not os.path.isdir(path):
                  return f"Directory '{path}' not found."
              try:
                  if recursive:
                      entries = []
                      for root, dirs, files in os.walk(path):
                          dirs[:] = [d for d in dirs if not d.startswith(".") and d not in ["node_modules", "__pycache__", "dist", "build"]]
                          for f in files:
                              entries.append(os.path.relpath(os.path.join(root, f), "."))
                      return f"{path}/ ({len(entries)} files)\n" + "\n".join(sorted(entries)[:200])
                  else:
                      items = sorted(os.listdir(path))
                      lines = []
                      for item in items:
                          full = os.path.join(path, item)
                          if os.path.isdir(full):
                              lines.append(f"📁 {item}/")
                          else:
                              lines.append(f"📄 {item} ({os.path.getsize(full)}b)")
                      return f"{path}/\n" + "\n".join(lines)
              except Exception as e:
                  return f"Error: {e}"

          def tool_get_file_diff(path):
              try:
                  if path == "*":
                      d = pr_diff[:80000]
                      return f"Full PR diff ({len(pr_diff)} chars):\n\n{d}"
                  # Extract from cached diff
                  chunks = {}
                  cur_file, cur_lines = None, []
                  for line in pr_diff.splitlines(keepends=True):
                      if line.startswith("diff --git"):
                          if cur_file: chunks[cur_file] = "".join(cur_lines)
                          parts = line.split(" b/")
                          cur_file = parts[-1].strip() if len(parts) > 1 else None
                          cur_lines = [line]
                      else: cur_lines.append(line)
                  if cur_file: chunks[cur_file] = "".join(cur_lines)
                  if path in chunks:
                      return f"Diff for {path}:\n\n{chunks[path]}"
                  result = subprocess.run(
                      ["git", "diff", f"origin/{pr_meta.get('baseRefName','main')}...HEAD", "--", path],
                      capture_output=True, text=True, timeout=10)
                  return f"Diff for {path}:\n\n{result.stdout[:80000]}" if result.stdout else f"No diff for '{path}'"
              except Exception as e:
                  return f"Error: {e}"

          def tool_get_git_log(max_commits=10, path=None):
              cmd = ["git", "log", f"--max-count={max_commits}", "--oneline", "--stat"]
              if path: cmd.extend(["--", path])
              return subprocess.run(cmd, capture_output=True, text=True, timeout=10).stdout[:10000]

          def tool_get_file_blame(path, start_line=None, end_line=None):
              if not os.path.isfile(path): return f"Not found: '{path}'"
              cmd = ["git", "blame", "-L", f"{start_line or 1},{end_line or ''}".rstrip(","), path] if start_line else ["git", "blame", path]
              result = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
              output = result.stdout[:15000]
              return f"Blame for {path}:\n\n{output}" if output else f"No blame for '{path}'"

          def tool_run_command(command, timeout=60):
              """Execute a shell command in the repo. Used for running tests, linters, type checkers."""
              # Safety: block destructive commands
              dangerous = ["rm ", "rm\t", "rmdir", "mkfs", "dd ", "curl ", "wget ", "ssh ",
                           "> /", "chmod", "chown", "sudo", "kill", "reboot", "shutdown",
                           "git push", "git remote", "git checkout", "npm publish", "pip install"]
              cmd_lower = command.lower().strip()
              for d in dangerous:
                  if d in cmd_lower:
                      return f"BLOCKED: Command contains dangerous pattern '{d}'. Only run tests, linters, and type checkers."

              # Allow-list of safe command prefixes
              safe_prefixes = ["python", "pytest", "python -m pytest", "python -m py_compile",
                               "npx ", "node ", "npm test", "npm run", "go test", "go vet",
                               "cargo test", "cargo check", "ruff ", "mypy ", "flake8",
                               "eslint", "tsc ", "black --check", "isort --check",
                               "grep ", "find ", "cat ", "head ", "tail ", "wc "]
              if not any(cmd_lower.startswith(p) for p in safe_prefixes):
                  return f"BLOCKED: Command '{command}' not in allowed prefix list. Allowed: {', '.join(safe_prefixes[:10])}..."

              try:
                  result = subprocess.run(
                      command, shell=True, capture_output=True, text=True,
                      timeout=min(timeout, 120), cwd=".",
                      env={**os.environ, "CI": "true", "PYTHONDONTWRITEBYTECODE": "1"}
                  )
                  output = ""
                  if result.stdout:
                      output += f"STDOUT:\n{result.stdout[-8000:]}\n"
                  if result.stderr:
                      output += f"STDERR:\n{result.stderr[-4000:]}\n"
                  output += f"\nExit code: {result.returncode}"

                  execution_log.append({
                      "command": command,
                      "exit_code": result.returncode,
                      "stdout_tail": result.stdout[-2000:] if result.stdout else "",
                      "stderr_tail": result.stderr[-1000:] if result.stderr else "",
                  })

                  return output if output.strip() else f"Command completed with exit code {result.returncode} (no output)"
              except subprocess.TimeoutExpired:
                  return f"TIMEOUT: Command exceeded {timeout}s limit."
              except Exception as e:
                  return f"Error: {e}"

          def tool_check_syntax(code, language):
              if language == "python":
                  try:
                      import ast; ast.parse(code)
                      return "✅ Valid Python."
                  except SyntaxError as e:
                      return f"❌ Python syntax error line {e.lineno}: {e.msg}"
              elif language == "json":
                  try:
                      json.loads(code); return "✅ Valid JSON."
                  except json.JSONDecodeError as e:
                      return f"❌ JSON error line {e.lineno}: {e.msg}"
              elif language == "yaml":
                  try:
                      import importlib; importlib.import_module("yaml").safe_load(code)
                      return "✅ Valid YAML."
                  except Exception as e:
                      return f"❌ YAML error: {e}"
              return f"Not supported: '{language}'"

          def tool_submit_review_issue(file, line, severity, description, suggestion, context_evidence=None):
              review_issues.append({
                  "file": file, "line": line, "severity": severity,
                  "description": description, "suggestion": suggestion,
                  "context_evidence": context_evidence,
              })
              return f"✅ Recorded {severity} on {file}:{line}. ({len(review_issues)} total)"

          def tool_submit_fix(path, content, explanation, confidence):
              if any(fnmatch.fnmatch(path, p) for p in PROTECTED):
                  return f"REJECTED: '{path}' is protected."
              if not os.path.isfile(path):
                  return f"REJECTED: '{path}' not found."
              if confidence < 0.6:
                  return f"REJECTED: Confidence {confidence} < 0.6. Use submit_review_issue instead."

              with open(path) as f: original = f.read()

              ratio = len(content) / max(len(original), 1)
              if ratio < 0.3 or ratio > 3.0:
                  return f"REJECTED: Size ratio {ratio:.2f} suspicious."
              if len(original.splitlines()) > 10 and len(content.splitlines()) < len(original.splitlines()) * 0.3:
                  return f"REJECTED: Too many lines deleted."

              ext = Path(path).suffix
              if ext == ".py":
                  try:
                      import ast; ast.parse(content)
                  except SyntaxError as e:
                      return f"REJECTED: Python syntax error line {e.lineno}: {e.msg}"
              if ext == ".json":
                  try: json.loads(content)
                  except json.JSONDecodeError as e:
                      return f"REJECTED: Invalid JSON: {e}"

              with tempfile.NamedTemporaryFile(mode="w", suffix=".orig", delete=False) as tmp:
                  tmp.write(original); tmp_path = tmp.name
              diff_r = subprocess.run(["diff", "-u", "--label", f"a/{path}", tmp_path, "--label", f"b/{path}", "-"],
                                      input=content, capture_output=True, text=True)
              os.unlink(tmp_path)

              with open(path, "w") as f: f.write(content)
              subprocess.run(["git", "add", path], check=True)

              applied_fixes.append({
                  "file": path, "explanation": explanation,
                  "confidence": confidence, "diff": diff_r.stdout[:5000],
              })
              return f"ACCEPTED: '{path}' fixed.\n\nDiff:\n{diff_r.stdout[:3000]}"

          def tool_save_convention(pattern_type, description, example):
              """Record a project convention or pattern for future reviews."""
              memory.setdefault("conventions", []).append({
                  "type": pattern_type,
                  "description": description,
                  "example": example,
                  "pr": PR_NUMBER,
              })
              # Keep only last 50 conventions
              memory["conventions"] = memory["conventions"][-50:]
              return f"✅ Convention recorded: {description[:80]}"

          # ═══════════════════════════════════════════
          # Tool definitions for OpenAI
          # ═══════════════════════════════════════════

          tools = [
              {"type": "function", "function": {
                  "name": "read_file",
                  "description": "Read file content with optional line range.",
                  "parameters": {"type": "object", "properties": {
                      "path": {"type": "string"}, "start_line": {"type": "integer"}, "end_line": {"type": "integer"}
                  }, "required": ["path"]}}},
              {"type": "function", "function": {
                  "name": "search_codebase",
                  "description": "Regex search across the repo. Returns matching files with line numbers and context.",
                  "parameters": {"type": "object", "properties": {
                      "pattern": {"type": "string"}, "file_glob": {"type": "string"}, "max_results": {"type": "integer"}
                  }, "required": ["pattern"]}}},
              {"type": "function", "function": {
                  "name": "list_directory",
                  "description": "List directory contents.",
                  "parameters": {"type": "object", "properties": {
                      "path": {"type": "string"}, "recursive": {"type": "boolean"}
                  }, "required": ["path"]}}},
              {"type": "function", "function": {
                  "name": "get_file_diff",
                  "description": "Get PR diff for a file, or '*' for full diff.",
                  "parameters": {"type": "object", "properties": {
                      "path": {"type": "string"}
                  }, "required": ["path"]}}},
              {"type": "function", "function": {
                  "name": "get_git_log",
                  "description": "Recent commit history, optionally for a specific file.",
                  "parameters": {"type": "object", "properties": {
                      "max_commits": {"type": "integer"}, "path": {"type": "string"}
                  }, "required": []}}},
              {"type": "function", "function": {
                  "name": "get_file_blame",
                  "description": "Git blame for a file or line range.",
                  "parameters": {"type": "object", "properties": {
                      "path": {"type": "string"}, "start_line": {"type": "integer"}, "end_line": {"type": "integer"}
                  }, "required": ["path"]}}},
              {"type": "function", "function": {
                  "name": "run_command",
                  "description": "Execute a shell command in the repo. Use for running tests, linters, type checkers. Only safe commands are allowed (python, pytest, npx, go test, ruff, mypy, eslint, etc). Use to verify your fixes actually work.",
                  "parameters": {"type": "object", "properties": {
                      "command": {"type": "string", "description": "Shell command to run"},
                      "timeout": {"type": "integer", "description": "Timeout in seconds (default 60, max 120)"}
                  }, "required": ["command"]}}},
              {"type": "function", "function": {
                  "name": "check_syntax",
                  "description": "Validate code syntax. Supports: python, json, yaml.",
                  "parameters": {"type": "object", "properties": {
                      "code": {"type": "string"}, "language": {"type": "string"}
                  }, "required": ["code", "language"]}}},
              {"type": "function", "function": {
                  "name": "submit_review_issue",
                  "description": "Record a review finding. Call for each issue.",
                  "parameters": {"type": "object", "properties": {
                      "file": {"type": "string"}, "line": {"type": "integer"},
                      "severity": {"type": "string", "enum": ["critical", "warning", "nit"]},
                      "description": {"type": "string"}, "suggestion": {"type": "string"},
                      "context_evidence": {"type": "string"}
                  }, "required": ["file", "line", "severity", "description", "suggestion"]}}},
              {"type": "function", "function": {
                  "name": "submit_fix",
                  "description": "Auto-fix a file (critical issues only). Provide COMPLETE file content. Validated before acceptance.",
                  "parameters": {"type": "object", "properties": {
                      "path": {"type": "string"}, "content": {"type": "string"},
                      "explanation": {"type": "string"},
                      "confidence": {"type": "number", "description": "0.0-1.0"}
                  }, "required": ["path", "content", "explanation", "confidence"]}}},
              {"type": "function", "function": {
                  "name": "save_convention",
                  "description": "Record a project convention or pattern you noticed, so future reviews can check for it.",
                  "parameters": {"type": "object", "properties": {
                      "pattern_type": {"type": "string", "description": "Category: naming, structure, error_handling, testing, imports, etc."},
                      "description": {"type": "string"}, "example": {"type": "string"}
                  }, "required": ["pattern_type", "description", "example"]}}},
              {"type": "function", "function": {
                  "name": "finish_review",
                  "description": "Complete the review with your final assessment.",
                  "parameters": {"type": "object", "properties": {
                      "overall_summary": {"type": "string"},
                      "verdict": {"type": "string", "enum": ["approve", "request_changes", "comment"]},
                      "risk_level": {"type": "string", "enum": ["critical", "high", "moderate", "low", "none"]},
                      "architecture_notes": {"type": "string"},
                      "missing_changes": {"type": "array", "items": {"type": "string"}},
                      "positive_notes": {"type": "array", "items": {"type": "string"}},
                      "test_verification": {"type": "string", "description": "Did you run tests? What were the results?"}
                  }, "required": ["overall_summary", "verdict", "risk_level"]}}}
          ]

          DISPATCH = {
              "read_file": lambda a: tool_read_file(a["path"], a.get("start_line"), a.get("end_line")),
              "search_codebase": lambda a: tool_search_codebase(a["pattern"], a.get("file_glob"), a.get("max_results", 10)),
              "list_directory": lambda a: tool_list_directory(a["path"], a.get("recursive", False)),
              "get_file_diff": lambda a: tool_get_file_diff(a["path"]),
              "get_git_log": lambda a: tool_get_git_log(a.get("max_commits", 10), a.get("path")),
              "get_file_blame": lambda a: tool_get_file_blame(a["path"], a.get("start_line"), a.get("end_line")),
              "run_command": lambda a: tool_run_command(a["command"], a.get("timeout", 60)),
              "check_syntax": lambda a: tool_check_syntax(a["code"], a["language"]),
              "submit_review_issue": lambda a: tool_submit_review_issue(a["file"], a["line"], a["severity"], a["description"], a["suggestion"], a.get("context_evidence")),
              "submit_fix": lambda a: tool_submit_fix(a["path"], a["content"], a["explanation"], a.get("confidence", 0.8)),
              "save_convention": lambda a: tool_save_convention(a["pattern_type"], a["description"], a["example"]),
              "finish_review": None,
          }

          # ═══════════════════════════════════════════
          # Agent runner
          # ═══════════════════════════════════════════

          def run_agent(name, system_prompt, user_prompt, max_rounds):
              """Run a single agent loop. Returns (finished, finish_data)."""
              print(f"\n{'═' * 60}")
              print(f"AGENT: {name}")
              print(f"{'═' * 60}")

              messages = [
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt},
              ]

              finished = False
              finish_data = {}

              for round_num in range(1, max_rounds + 1):
                  print(f"\n── {name} Round {round_num}/{max_rounds} ──")

                  response = None
                  for attempt in range(MAX_RETRIES + 1):
                      try:
                          response = client.chat.completions.create(
                              model=MODEL, messages=messages, tools=tools,
                              tool_choice="auto", temperature=0.1, max_tokens=8000,
                          )
                          break
                      except Exception as e:
                          print(f"  API error ({attempt+1}): {e}")
                          time.sleep(2 ** (attempt + 1))

                  if response is None:
                      print(f"  API failed for {name}")
                      break

                  msg = response.choices[0].message
                  messages.append(msg)

                  if not msg.tool_calls:
                      print(f"  Text: {(msg.content or '')[:150]}")
                      if round_num > 3: break
                      continue

                  for tc in msg.tool_calls:
                      fn = tc.function.name
                      try: args = json.loads(tc.function.arguments)
                      except: args = {}

                      preview = json.dumps(args)
                      if len(preview) > 150: preview = preview[:150] + "..."
                      print(f"  🔧 {fn}({preview})")

                      if fn == "finish_review":
                          finished = True
                          finish_data = args
                          result = "Review finished."
                          print(f"  ✅ {name} complete: {args.get('verdict', '?')}")
                      elif fn in DISPATCH:
                          try: result = DISPATCH[fn](args)
                          except Exception as e: result = f"Error: {e}"
                          if len(result) > 60000: result = result[:60000] + "\n...[truncated]"
                          print(f"    → {len(result)} chars")
                      else:
                          result = f"Unknown tool: {fn}"

                      messages.append({"role": "tool", "tool_call_id": tc.id, "content": result})

                  if finished: break

              return finished, finish_data

          # ═══════════════════════════════════════════
          # Seed diff (truncated for initial prompt)
          # ═══════════════════════════════════════════

          seed_diff = pr_diff
          if len(seed_diff) > 20000:
              seed_diff = seed_diff[:10000] + "\n...[truncated — use get_file_diff for details]...\n" + seed_diff[-10000:]

          human_ctx = ""
          if human_comments:
              human_ctx = "\n## Existing Human Comments (don't duplicate):\n"
              for c in human_comments[:20]:
                  human_ctx += f"- {c['file']}:{c.get('line','?')} ({c['author']}): {c['body']}\n"

          memory_ctx = ""
          if memory.get("conventions"):
              memory_ctx = "\n## Known Project Conventions (from previous reviews):\n"
              for c in memory["conventions"][-15:]:
                  memory_ctx += f"- [{c['type']}] {c['description']}\n"

          stack_str = json.dumps(stack, indent=2)

          base_context = f"""
## PR Title: {pr_title}

## PR Description:
{pr_body[:3000] if pr_body else "(none)"}

## Changed Files ({len(review_files)} to review, {len(skipped_files)} skipped):
{chr(10).join('- ' + f for f in review_files)}

## Detected Stack:
{stack_str}

## Repository Structure:
```
{open('/tmp/review/repo_tree.txt').read()[:5000]}
```
{human_ctx}{memory_ctx}
## PR Diff:
```diff
{seed_diff}
```"""

          # ═══════════════════════════════════════════
          # AGENT 1: Security & Correctness Specialist
          # ═══════════════════════════════════════════

          security_system = f"""You are a security and correctness specialist reviewing a pull request.

## Your focus areas (in priority order):
1. **Security vulnerabilities**: injection (SQL, XSS, command), auth bypass, secrets in code, SSRF, path traversal, insecure deserialization, missing input validation
2. **Data integrity**: race conditions, missing transactions, data loss scenarios, inconsistent state
3. **Critical bugs**: null derefs, unhandled errors that crash, infinite loops, resource leaks, deadlocks
4. **Breaking changes**: API/interface changes that break callers, removed functionality

## Your approach:
- Read each changed file IN FULL (not just the diff) to understand the security context
- For any auth/validation/input-handling code, search for ALL call sites
- For any new API endpoint, check what auth middleware protects it
- For any database query, check for injection vectors
- For any file/path operation, check for traversal
- Run the project's linter if available: {json.dumps(stack.get('lint_commands', []))}
- If you find a critical security issue, auto-fix it with submit_fix
- Use save_convention if you notice security patterns the project follows

## Rules:
- ALWAYS read_file before commenting — verify, don't guess
- ALWAYS search_codebase to check callers when a function signature changes
- Only report issues you're confident about — no speculative warnings
- If you submit a fix, run the linter/tests after to verify it doesn't break anything
"""

          # ═══════════════════════════════════════════
          # AGENT 2: Architecture & Quality Specialist
          # ═══════════════════════════════════════════

          quality_system = f"""You are an architecture and code quality specialist reviewing a pull request.

## Your focus areas:
1. **Architecture fit**: Does this change fit the project's patterns? Does it belong in the right layer/module?
2. **Completeness**: Missing tests, missing error handling, missing docs, missing migrations, missing type annotations
3. **Performance**: N+1 queries, unnecessary computation, memory issues, blocking calls in async code
4. **Code quality**: DRY violations (duplicating existing code), naming, readability, overly complex logic
5. **Conventions**: Does the code follow the project's established patterns?

## Your approach:
- Read each changed file IN FULL to understand it in context
- For new functions/classes, search if similar functionality already exists (DRY check)
- Check if tests exist for the changed code — if not, flag it
- Run tests if available: {json.dumps(stack.get('test_commands', []))}
- Look at sibling files (list_directory) to understand local conventions
- Use save_convention when you discover project patterns worth remembering
- Check git_log to understand change velocity and recent refactors

## Rules:
- ALWAYS read_file before commenting
- Be constructive — explain WHY something is an issue, not just WHAT
- Include positive_notes in finish_review — acknowledge good work
- Nits are fine but label them clearly
- Flag missing tests as warnings, not criticals
"""

          # ═══════════════════════════════════════════
          # Run both agents
          # ═══════════════════════════════════════════

          # Agent 1: Security & Correctness
          sec_finished, sec_finish = run_agent(
              "Security & Correctness",
              security_system,
              f"Review this PR for security and correctness issues.\n{base_context}",
              max_rounds=MAX_ROUNDS // 2 + 5,  # slightly more than half
          )

          sec_issues = list(review_issues)  # snapshot
          sec_fixes  = list(applied_fixes)

          # Agent 2: Architecture & Quality
          # Include agent 1's findings so agent 2 doesn't duplicate
          agent1_findings = ""
          if sec_issues:
              agent1_findings = "\n\n## Issues already found by security reviewer (don't duplicate):\n"
              for iss in sec_issues:
                  agent1_findings += f"- [{iss['severity']}] {iss['file']}:{iss['line']}: {iss['description'][:100]}\n"

          qual_finished, qual_finish = run_agent(
              "Architecture & Quality",
              quality_system,
              f"Review this PR for architecture and quality.\n{base_context}{agent1_findings}",
              max_rounds=MAX_ROUNDS // 2 + 5,
          )

          # ═══════════════════════════════════════════
          # Merge results
          # ═══════════════════════════════════════════

          # Deduplicate issues (same file + similar line + similar description)
          seen = set()
          deduped_issues = []
          for iss in review_issues:
              key = (iss["file"], iss["line"] // 5, iss["description"][:50].lower())
              if key not in seen:
                  seen.add(key)
                  deduped_issues.append(iss)

          # Merge finish data
          finish = {}
          for fd in [sec_finish, qual_finish]:
              if not fd: continue
              for key in ["overall_summary", "architecture_notes", "test_verification"]:
                  if fd.get(key):
                      finish[key] = finish.get(key, "") + ("\n\n" if finish.get(key) else "") + fd[key]
              for key in ["missing_changes", "positive_notes"]:
                  finish.setdefault(key, []).extend(fd.get(key, []))

          # Verdict = strictest
          verdict_priority = {"request_changes": 3, "comment": 2, "approve": 1}
          verdicts = [sec_finish.get("verdict", "comment"), qual_finish.get("verdict", "comment")]
          final_verdict = max(verdicts, key=lambda v: verdict_priority.get(v, 0))

          # Risk = highest
          risk_priority = {"critical": 5, "high": 4, "moderate": 3, "low": 2, "none": 1}
          risks = [sec_finish.get("risk_level", "low"), qual_finish.get("risk_level", "low")]
          final_risk = max(risks, key=lambda r: risk_priority.get(r, 0))

          finish["verdict"] = final_verdict
          finish["risk_level"] = final_risk

          # Dedup positive notes and missing changes
          finish["positive_notes"] = list(dict.fromkeys(finish.get("positive_notes", [])))
          finish["missing_changes"] = list(dict.fromkeys(finish.get("missing_changes", [])))

          # Decision
          crit = sum(1 for i in deduped_issues if i["severity"] == "critical")
          warn = sum(1 for i in deduped_issues if i["severity"] == "warning")

          if applied_fixes:
              decision = "FIX"
          elif final_verdict == "approve" and crit == 0:
              decision = "APPROVE"
          elif crit > 0 or final_verdict == "request_changes":
              decision = "REQUEST_CHANGES"
          else:
              decision = "COMMENT"

          confidence = 0.9 if (sec_finished and qual_finished) else 0.7 if (sec_finished or qual_finished) else 0.5
          total_rounds = MAX_ROUNDS  # approximate

          result = {
              "decision": decision,
              "confidence": confidence,
              "finish": finish,
              "issues": deduped_issues,
              "fixes": applied_fixes,
              "execution_log": execution_log,
              "agents": {
                  "security": {"finished": sec_finished, "issues": len(sec_issues), "fixes": len(sec_fixes)},
                  "quality": {"finished": qual_finished, "issues": len(deduped_issues) - len(sec_issues), "fixes": len(applied_fixes) - len(sec_fixes)},
              },
              "stats": {
                  "files_reviewed": len(review_files),
                  "files_skipped": len(skipped_files),
                  "critical": crit,
                  "warnings": warn,
                  "nits": sum(1 for i in deduped_issues if i["severity"] == "nit"),
                  "total_issues": len(deduped_issues),
                  "fixes_applied": len(applied_fixes),
                  "commands_run": len(execution_log),
              }
          }

          with open("/tmp/review/result.json", "w") as f:
              json.dump(result, f, indent=2)

          # Save updated memory
          os.makedirs(".ai-review-memory", exist_ok=True)
          with open(".ai-review-memory/memory.json", "w") as f:
              json.dump(memory, f, indent=2)

          print(f"\n{'═' * 60}")
          print(f"REVIEW COMPLETE")
          print(f"Decision: {decision} | Verdict: {final_verdict} | Risk: {final_risk}")
          print(f"Issues: {crit} critical, {warn} warnings, {len(deduped_issues)} total")
          print(f"Fixes: {len(applied_fixes)} | Commands run: {len(execution_log)}")
          print(f"Security agent: {len(sec_issues)} issues | Quality agent: {len(deduped_issues)-len(sec_issues)} issues")
          print(f"{'═' * 60}")
          PYEOF

      # ──────────────────────────────────────────────
      # 5. Commit fixes
      # ──────────────────────────────────────────────
      - name: Commit Auto-Fixes
        id: commit
        run: |
          if git diff --cached --quiet; then
              echo "committed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 << 'PYEOF'
          import json
          with open("/tmp/review/result.json") as f:
              r = json.load(f)
          msg = "🤖 AI Review Auto-Fix: critical issues\n\n"
          for fix in r.get("fixes", []):
              msg += f"- {fix['file']}: {fix['explanation'][:100]}\n"
          msg += f"\nModel: gpt-5.3-chat via LiteLLM (multi-agent)\n⚠️ Auto-generated — please verify"
          with open("/tmp/review/commit_msg.txt", "w") as f:
              f.write(msg)
          PYEOF

          git commit -F /tmp/review/commit_msg.txt
          git push origin "HEAD:${{ github.head_ref }}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────
      # 6. Post review via proper GitHub Review API
      # ──────────────────────────────────────────────
      - name: Post Review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          pr_number = os.environ["PR_NUMBER"]
          repo     = os.environ["REPO"]
          head_sha = os.environ["HEAD_SHA"]
          committed = os.environ.get("COMMITTED", "false") == "true"

          result = {"decision": "COMMENT", "confidence": 0, "finish": {}, "issues": [], "fixes": [], "stats": {}, "agents": {}, "execution_log": []}
          try:
              with open("/tmp/review/result.json") as f:
                  result = json.load(f)
          except: pass

          diff_positions = {}
          try:
              with open("/tmp/review/diff_positions.json") as f:
                  diff_positions = json.load(f)
          except: pass

          decision   = result.get("decision", "COMMENT")
          confidence = result.get("confidence", 0)
          finish     = result.get("finish", {})
          issues     = result.get("issues", [])
          fixes      = result.get("fixes", [])
          stats      = result.get("stats", {})
          agents     = result.get("agents", {})
          exec_log   = result.get("execution_log", [])

          sev_icons = {"critical": "🔴", "warning": "🟡", "nit": "🔵"}
          dec_icons = {"FIX": "🔧", "APPROVE": "✅", "REQUEST_CHANGES": "⛔", "COMMENT": "💬"}
          dec_labels = {"FIX": "Auto-Fixed", "APPROVE": "Approved", "REQUEST_CHANGES": "Changes Requested", "COMMENT": "Suggestions"}
          risk_icons = {"critical": "🔴", "high": "🟠", "moderate": "🟡", "low": "🟢", "none": "⚪"}

          # ────────────────────────────────────
          # Build inline review comments for the
          # GitHub Pull Request Review API
          # ────────────────────────────────────

          inline_comments = []
          for iss in issues:
              if iss["severity"] not in ("critical", "warning"):
                  continue
              fname = iss["file"]
              line  = iss.get("line")
              if not line or fname not in diff_positions:
                  continue

              # Map the logical line number to a diff position
              positions = diff_positions[fname]
              # Try exact match, then nearest line in the diff
              if str(line) in positions:
                  position = positions[str(line)]
              else:
                  # Find closest line that IS in the diff
                  available = {int(k): v for k, v in positions.items()}
                  if not available:
                      continue
                  closest = min(available.keys(), key=lambda l: abs(l - line))
                  if abs(closest - line) > 10:
                      continue  # too far from any diff line
                  position = available[closest]
                  line = closest

              icon = sev_icons[iss["severity"]]
              body = f"{icon} **{iss['severity'].upper()}**: {iss['description']}"
              if iss.get("suggestion"):
                  body += f"\n\n💡 **Suggestion**: {iss['suggestion']}"
              if iss.get("context_evidence"):
                  body += f"\n\n📎 *{iss['context_evidence'][:200]}*"

              inline_comments.append({
                  "path": fname,
                  "position": position,
                  "body": body,
              })

          # ────────────────────────────────────
          # Submit formal GitHub Review with
          # inline comments
          # ────────────────────────────────────

          # Build review body (the summary comment)
          lines = []
          lines.append(f"## 🤖 AI Review — {dec_icons.get(decision, '📝')} {dec_labels.get(decision, decision)}")
          lines.append("")

          risk = finish.get("risk_level", "unknown")
          ri = risk_icons.get(risk, "❓")
          ci = "🟢" if confidence >= 0.8 else "🟡" if confidence >= 0.5 else "🔴"
          lines.append(f"**Model**: `gpt-5.3-chat` (multi-agent) &nbsp;|&nbsp; "
                       f"**Confidence**: {ci} {confidence:.0%} &nbsp;|&nbsp; "
                       f"**Risk**: {ri} {risk}")
          lines.append("")

          # Agent breakdown
          sec = agents.get("security", {})
          qual = agents.get("quality", {})
          lines.append(f"*🛡️ Security agent: {sec.get('issues', 0)} issues, {sec.get('fixes', 0)} fixes &nbsp;|&nbsp; "
                       f"🏗️ Quality agent: {qual.get('issues', 0)} issues, {qual.get('fixes', 0)} fixes*")
          lines.append("")

          # Summary
          lines.append("### 📋 Summary")
          lines.append(finish.get("overall_summary", "No summary."))
          lines.append("")

          if finish.get("architecture_notes"):
              lines.append(f"**🏗 Architecture**: {finish['architecture_notes']}")
              lines.append("")

          if finish.get("test_verification"):
              lines.append(f"**🧪 Test Verification**: {finish['test_verification']}")
              lines.append("")

          # Positive notes
          pos = finish.get("positive_notes", [])
          if pos:
              lines.append("### 👍 What's Good")
              for p in pos:
                  lines.append(f"- {p}")
              lines.append("")

          # Missing changes
          missing = finish.get("missing_changes", [])
          if missing:
              lines.append("### ⚠️ Potentially Missing")
              for m in missing:
                  lines.append(f"- {m}")
              lines.append("")

          # Stats
          lines.append("### 📊 Stats")
          lines.append("| Reviewed | Skipped | Critical | Warnings | Nits | Fixes | Commands Run |")
          lines.append("|:-:|:-:|:-:|:-:|:-:|:-:|:-:|")
          lines.append(f"| {stats.get('files_reviewed',0)} | {stats.get('files_skipped',0)} | "
                       f"{stats.get('critical',0)} | {stats.get('warnings',0)} | "
                       f"{stats.get('nits',0)} | {stats.get('fixes_applied',0)} | "
                       f"{stats.get('commands_run',0)} |")
          lines.append("")

          # Issues by file (non-inline ones, i.e. nits + anything that couldn't be placed inline)
          inline_paths = {(c["path"], c["position"]) for c in inline_comments}
          remaining_issues = [i for i in issues if i["severity"] == "nit" or i["file"] not in diff_positions]

          if remaining_issues:
              lines.append(f"### 🔍 Additional Notes ({len(remaining_issues)})")
              lines.append("")
              by_file = {}
              for iss in remaining_issues:
                  by_file.setdefault(iss["file"], []).append(iss)
              for fp, file_issues in sorted(by_file.items()):
                  lines.append("<details>")
                  lines.append(f"<summary><strong>{fp}</strong> ({len(file_issues)} notes)</summary>")
                  lines.append("")
                  for iss in file_issues:
                      icon = sev_icons.get(iss["severity"], "⚪")
                      lines.append(f"- {icon} **L{iss.get('line','?')}**: {iss['description']}")
                      if iss.get("suggestion"): lines.append(f"  > 💡 {iss['suggestion']}")
                  lines.append("</details>")
                  lines.append("")

          # Fixes
          if fixes:
              lines.append(f"### 🔧 Auto-Fixes ({len(fixes)})")
              lines.append("")
              for fix in fixes:
                  lines.append("<details>")
                  lines.append(f"<summary><strong>{fix['file']}</strong> — {fix['explanation'][:100]}</summary>")
                  lines.append("")
                  if fix.get("diff"):
                      lines.append("```diff")
                      lines.append(fix["diff"][:3000])
                      lines.append("```")
                  lines.append("</details>")
                  lines.append("")
              if committed:
                  lines.append("> 🔧 **Fix commit pushed.** Please review.")
              lines.append("")

          # Execution log
          if exec_log:
              lines.append("<details>")
              lines.append(f"<summary>🖥️ <strong>{len(exec_log)} command(s) executed</strong></summary>")
              lines.append("")
              for log in exec_log:
                  status = "✅" if log.get("exit_code") == 0 else "❌"
                  lines.append(f"- {status} `{log['command'][:80]}` (exit {log.get('exit_code', '?')})")
              lines.append("</details>")
              lines.append("")

          # Clean files
          reviewed_files = set(i["file"] for i in issues) | set(f["file"] for f in fixes)
          clean = [f for f in json.load(open("/tmp/review/review_files.json")) if f not in reviewed_files]
          if clean:
              lines.append("<details>")
              lines.append(f"<summary>✅ <strong>{len(clean)} file(s)</strong> with no issues</summary>")
              lines.append("")
              for f in clean: lines.append(f"- {f}")
              lines.append("</details>")
              lines.append("")

          lines.append("---")
          lines.append("*AI PR Reviewer v5 (multi-agent + execution) • re-trigger by pushing a commit*")

          review_body = "\n".join(lines)

          # ────────────────────────────────────
          # Submit via GitHub Review API
          # (single atomic review with inline comments)
          # ────────────────────────────────────

          event_map = {
              "APPROVE": "APPROVE",
              "REQUEST_CHANGES": "REQUEST_CHANGES",
              "FIX": "REQUEST_CHANGES",
              "COMMENT": "COMMENT",
          }
          gh_event = event_map.get(decision, "COMMENT")

          review_payload = {
              "body": review_body,
              "event": gh_event,
              "commit_id": head_sha,
          }

          if inline_comments:
              review_payload["comments"] = inline_comments

          # Write payload and submit
          with open("/tmp/review/review_payload.json", "w") as f:
              json.dump(review_payload, f, indent=2)

          try:
              result = subprocess.run(
                  ["gh", "api", f"repos/{repo}/pulls/{pr_number}/reviews",
                   "--input", "/tmp/review/review_payload.json"],
                  capture_output=True, text=True, timeout=30,
              )

              if result.returncode == 0:
                  print(f"✅ GitHub Review submitted: {gh_event} with {len(inline_comments)} inline comment(s)")
              else:
                  print(f"⚠️ Review API failed: {result.stderr[:500]}")
                  # Fallback: post as regular comment + individual inline comments
                  print("Falling back to regular comment...")
                  subprocess.run([
                      "gh", "pr", "comment", pr_number, "--repo", repo,
                      "--body-file", "-",
                  ], input=review_body, text=True, check=False)

                  for ic in inline_comments[:20]:  # limit fallback inline comments
                      try:
                          subprocess.run([
                              "gh", "api", f"repos/{repo}/pulls/{pr_number}/comments",
                              "-f", f"body={ic['body']}",
                              "-f", f"commit_id={head_sha}",
                              "-f", f"path={ic['path']}",
                              "-F", f"position={ic['position']}",
                          ], capture_output=True, timeout=10)
                      except: pass

          except Exception as e:
              print(f"Error submitting review: {e}")
              # Last resort fallback
              with open("/tmp/review/comment.md", "w") as f:
                  f.write(review_body)
              subprocess.run(["gh", "pr", "comment", pr_number, "--repo", repo,
                              "--body-file", "/tmp/review/comment.md"], check=False)

          print(f"Review posted ({len(review_body)} chars, {len(inline_comments)} inline)")
          PYEOF

      # ──────────────────────────────────────────────
      # 7. Artifacts
      # ──────────────────────────────────────────────
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-${{ github.event.pull_request.number }}-${{ github.run_number }}
          path: |
            /tmp/review/result.json
            /tmp/review/review_payload.json
            /tmp/review/stack.json
          retention-days: 30
```

## v4 → v5: what's new

### 1. Multi-agent architecture

```
v4:  One agent → one long conversation → tries to catch everything

v5:  ┌─────────────────────────┐     ┌────────────────────────────┐
     │  🛡️ Security Agent      │     │  🏗️ Quality Agent          │
     │                         │     │                            │
     │  Focus:                 │     │  Focus:                    │
     │  - Vulnerabilities      │     │  - Architecture fit        │
     │  - Data integrity       │     │  - Test coverage           │
     │  - Breaking changes     │     │  - DRY violations          │
     │  - Auth/input handling  │     │  - Performance             │
     │                         │     │  - Conventions             │
     │  Runs first             │──▶  │  Sees agent 1's findings   │
     └─────────────────────────┘     └────────────────────────────┘
                         │                          │
                         ▼                          ▼
                    ┌──────────────────────────────────┐
                    │        Merge & Deduplicate       │
                    │  Verdict = strictest of both     │
                    │  Risk = highest of both          │
                    │  Issues = union (deduped)        │
                    └──────────────────────────────────┘
```

Each agent has a **focused system prompt** tuned for its specialty. Agent 2 receives agent 1's findings to avoid duplication. Both agents share the same tool implementations and issue/fix collectors.

### 2. Code execution (`run_command`)

| What | Why |
|---|---|
| Run the project's test suite | **Verify fixes actually pass tests**, not just "look right" |
| Run linters (ruff, eslint, mypy) | Catch issues statically that the LLM might miss |
| Run type checkers | Verify type compatibility after interface changes |
| Run syntax checks | Validate generated code before committing |

Safety rails:
- **Blocklist**: `rm`, `curl`, `wget`, `sudo`, `git push`, `pip install`, `npm publish`, etc.
- **Allowlist**: only commands starting with `python`, `pytest`, `npx`, `go test`, `ruff`, `mypy`, `eslint`, `grep`, `find`, `cat`, etc.
- **Timeout**: max 120 seconds
- **Environment**: `CI=true` to disable interactive prompts

The agent can now do things like:
```
Round 12: run_command("python -m pytest tests/test_auth.py -x --tb=short")
    → sees 2 tests fail
Round 13: [reads the failing test, understands the issue]
Round 14: submit_fix(...)
Round 15: run_command("python -m pytest tests/test_auth.py -x --tb=short")
    → all tests pass ✅
```

### 3. Proper GitHub Review API integration

v4 posted inline comments one-by-one via `POST /pulls/{id}/comments`, which was brittle (wrong line numbers → 422 errors, comments appeared scattered).

v5 uses the **Pull Request Review API** (`POST /pulls/{id}/reviews`) which:
- Submits all inline comments **atomically** as part of one review
- Sets the formal review status (APPROVE / REQUEST_CHANGES / COMMENT) 
- Inline comments appear grouped under one review, not as random orphans
- Uses **diff positions** (not line numbers) — the position within the diff hunk, which is what the API actually requires

The diff position mapping:
```python
# We parse the @@ hunk headers from the PR files API patch data
# to build: {filename: {new_line_number: diff_position}}
# This mapping lets us place inline comments on the exact right spot
```

With a fallback chain: Review API → regular comment + individual inline → just the comment body.

### 4. Project stack detection

The workflow auto-detects:
- **Languages** (by file extension frequency)
- **Frameworks** (by reading package.json, pyproject.toml, etc.)
- **Test runners** (pytest, jest, vitest, go test, etc.)
- **Linters** (ruff, eslint, mypy, prettier, etc.)
- **Package managers** (npm, pip, go mod, cargo)

This feeds into the agent prompts so they know **which commands to run** and **what patterns to expect**.

### 5. Cross-PR memory

```yaml
- name: Cache pip + review memory
  uses: actions/cache@v4
  with:
    path: |
      ~/.cache/pip
      .ai-review-memory/
    key: ${{ runner.os }}-reviewer-v5-${{ github.repository }}
```

The `save_convention` tool lets agents record patterns they discover:
```
save_convention(
    pattern_type="error_handling",
    description="All service methods wrap errors with ServiceError and include the operation name",
    example="raise ServiceError(f'create_user failed: {e}', operation='create_user')"
)
```

These are persisted across runs via GitHub Actions cache. Future reviews see:
```
## Known Project Conventions (from previous reviews):
- [error_handling] All service methods wrap errors with ServiceError and include the operation name
- [naming] Database models use snake_case, API schemas use camelCase
- [testing] Every service class has a corresponding test_<name>.py with a fixture in conftest.py
```

### 6. Project dependency installation

```yaml
# Detect project and install its deps so we can actually run tests/linters
if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
if [ -f "package.json" ]; then npm ci --ignore-scripts; fi
if [ -f "go.mod" ]; then go mod download; fi
```

v4 couldn't run tests because the project's dependencies weren't installed. v5 detects the package manager and installs dependencies, making `run_command("pytest")` actually work.

### 7. Formal review dismissal

```bash
# Dismiss old bot reviews (not just minimize comments)
gh api -X PUT "repos/$REPO/pulls/$PR_NUMBER/reviews/$rid/dismissals" \
  -f message="Superseded by new review."
```
