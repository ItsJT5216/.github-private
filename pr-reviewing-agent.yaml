                  "gh", "pr", "review", pr_number, "--repo", repo, "--request-changes",
                  "--body", f"🤖 AI review: {stats.get('critical',0)} critical issue(s) found. See comment for details.",
              ], check=False)

          # Post inline comments for critical/warning issues on specific lines
          # Uses the PR review comment API for in-line annotations
          for iss in issues:
              if iss["severity"] in ("critical", "warning") and iss.get("line"):
                  try:
