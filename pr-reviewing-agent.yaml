## v3 (stuffed context) → v4 (agentic): what changed for the reviewer

Same fundamental shift as the test fixer — instead of guessing what the model needs, let it drive:

### The 10 tools the review agent gets

| Tool | Purpose | Review-specific value |
|---|---|---|
| **`read_file`** | Read any file with optional line range | Read the full file around a diff hunk, not just the changed lines |
| **`search_codebase`** | Regex grep across repo | "Who calls this function I see being changed?" "Is this pattern used elsewhere?" |
| **`list_directory`** | Browse directory structure | "What else is in this module?" "Is there a tests/ folder here?" |
| **`get_file_diff`** | Per-file or full PR diff | "Show me just what changed in this one file" |
| **`get_git_log`** | Commit history | "Was this file recently refactored?" "What's the change velocity here?" |
| **`get_file_blame`** | Git blame with line range | "Who wrote this code I'm concerned about?" "How old is this pattern?" |
| **`check_syntax`** | Validate code snippets | Pre-validate a fix before submitting it |
| **`submit_review_issue`** | Record a finding | Structured issue with severity, line, suggestion, evidence |
| **`submit_fix`** | Auto-fix with validation | Safety rails: syntax check, size check, protected files |
| **`finish_review`** | Complete with assessment | Verdict, summary, architecture notes, missing changes, positive notes |

### What an actual agent review session looks like

```
Round 1:  [reads the PR diff in the seed prompt]
          "I see changes to auth.py, user_service.py, and a new migration. Let me look deeper."

Round 2:  read_file("src/auth.py")
          → reads full file, sees the JWT validation function changed

Round 3:  search_codebase("validate_jwt", "*.py")
          → finds 4 files that call validate_jwt

Round 4:  read_file("src/middleware/auth_middleware.py")
          → checks if the caller still works with the new signature

Round 5:  read_file("src/auth.py", start_line=45, end_line=60)
          → zooms into the specific function, notices no error handling for expired tokens

Round 6:  submit_review_issue(file="src/auth.py", line=52, severity="critical",
              description="validate_jwt now returns None for expired tokens but callers expect an exception",
              suggestion="Raise TokenExpiredError instead of returning None",
              context_evidence="auth_middleware.py:28 catches TokenExpiredError")

Round 7:  read_file("src/user_service.py")
          → reads the service changes

Round 8:  search_codebase("class User", "*.py")
          → finds the model definition

Round 9:  read_file("src/models/user.py")
          → checks if new fields exist on the model

Round 10: search_codebase("UserService", "*.py", max_results=15)
          → finds all callers of the service

Round 11: read_file("tests/test_user_service.py")
          → checks test coverage

Round 12: submit_review_issue(file="tests/test_user_service.py", line=1, severity="warning",
              description="No test for the new 'deactivate_user' method",
              suggestion="Add test_deactivate_user covering the soft-delete + audit log")

Round 13: get_file_blame("src/auth.py", start_line=45, end_line=60)
          → sees this code was written 2 days ago, confirms it's new

Round 14: list_directory("src/migrations")
          → confirms the migration file exists

Round 15: submit_review_issue(file="src/auth.py", line=52, severity="critical", ...)
          → records the fix it wants to make

Round 16: read_file("src/auth.py")  [re-reads to prepare fix]

Round 17: check_syntax(code="...", language="python")
          → validates fix syntax before submitting

Round 18: submit_fix(path="src/auth.py", content="...", explanation="...", confidence=0.9)
          → ACCEPTED

Round 19: finish_review(
              verdict="request_changes",
              overall_summary="PR adds user deactivation. Auth change has a critical bug...",
              positive_notes=["Clean migration", "Good separation of concerns"],
              missing_changes=["tests/test_user_service.py needs deactivation tests"])
```
