

```yaml
name: AI PR Reviewer v4 (gpt-5.3-chat + Tool Use)

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  LITELLM_BASE_URL: https://cohort-xero.duckdns.org/litellm/v1
  MODEL_NAME: gpt-5.3-chat
  MAX_RETRIES: 2
  MAX_TOOL_ROUNDS: 30
  IGNORE_PATTERNS: "*.lock,*.min.js,*.min.css,*.map,*.generated.*,package-lock.json,yarn.lock,pnpm-lock.yaml,*.pb.go,*.svg,*.png,*.jpg,*.ico,*.woff,*.woff2,*.ttf,*.eot"
  PROTECTED_PATTERNS: "*.lock,*.min.js,package-lock.json,yarn.lock,pnpm-lock.yaml,*.generated.*,*.pb.go"

jobs:
  ai-pr-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # ──────────────────────────────────────────────
      # 1. Setup
      # ──────────────────────────────────────────────
      - name: Checkout PR branch (full repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-reviewer-v4

      - name: Install dependencies
        run: pip install openai==1.60.0 requests==2.31.0

      # ──────────────────────────────────────────────
      # 2. Gather PR seed context
      # ──────────────────────────────────────────────
      - name: Gather PR Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # PR metadata
          gh pr view "$PR_NUMBER" --repo "$REPO" --json title,body,baseRefName,headRefName,files,labels,comments \
            > /tmp/pr_meta.json

          # Full PR diff
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr_diff.txt || true

          # Changed files list
          gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path' > /tmp/changed_files.txt

          # Existing review comments (so the model doesn't repeat what humans already said)
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" --paginate > /tmp/existing_review_comments.json 2>/dev/null || echo "[]" > /tmp/existing_review_comments.json

          echo "Changed files:"
          cat /tmp/changed_files.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Build Repo Index
        run: |
          python3 << 'PYEOF'
          import os, json, fnmatch

          ignore = os.environ.get("IGNORE_PATTERNS", "").split(",")

          repo_files = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if not d.startswith(".") and d not in [
                  "node_modules", "__pycache__", ".git", "dist", "build", "vendor",
                  ".next", ".nuxt", "coverage", ".tox", ".mypy_cache", "venv", "env",
                  ".venv", "target", "bin", "obj"
              ]]
              for f in files:
                  rel = os.path.relpath(os.path.join(root, f), ".")
                  repo_files.append(rel)

          # Filter changed files
          with open("/tmp/changed_files.txt") as f:
              all_changed = [l.strip() for l in f if l.strip()]

          review_files = []
          skipped_files = []
          for fpath in all_changed:
              if any(fnmatch.fnmatch(fpath, pat.strip()) for pat in ignore if pat.strip()):
                  skipped_files.append(fpath)
              else:
                  review_files.append(fpath)

          # Build tree
          tree = {}
          for fp in sorted(repo_files):
              parts = fp.split("/")
              d = tree
              for part in parts[:-1]:
                  d = d.setdefault(part, {})
              d[parts[-1]] = None

          def render_tree(d, prefix="", max_depth=4, depth=0):
              lines = []
              items = sorted(d.items())
              for i, (name, subtree) in enumerate(items):
                  is_last = i == len(items) - 1
                  connector = "└── " if is_last else "├── "
                  if subtree is None:
                      lines.append(f"{prefix}{connector}{name}")
                  else:
                      count = sum(1 for _ in _count(subtree))
                      if depth >= max_depth:
                          lines.append(f"{prefix}{connector}{name}/ ({count} files)")
                      else:
                          lines.append(f"{prefix}{connector}{name}/")
                          ext = "    " if is_last else "│   "
                          lines.extend(render_tree(subtree, prefix + ext, max_depth, depth + 1))
              return lines

          def _count(d):
              for k, v in d.items():
                  if v is None: yield k
                  else: yield from _count(v)

          tree_str = "\n".join(render_tree(tree)[:1000])

          with open("/tmp/repo_files.json", "w") as f:
              json.dump(repo_files, f)
          with open("/tmp/repo_tree.txt", "w") as f:
              f.write(tree_str)
          with open("/tmp/review_files.json", "w") as f:
              json.dump(review_files, f)
          with open("/tmp/skipped_files.json", "w") as f:
              json.dump(skipped_files, f)

          print(f"Repo: {len(repo_files)} files")
          print(f"To review: {len(review_files)}")
          print(f"Skipped: {len(skipped_files)}")
          PYEOF

      # ──────────────────────────────────────────────
      # 3. Dismiss stale bot comments
      # ──────────────────────────────────────────────
      - name: Dismiss stale bot comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq \
            '.[] | select(.user.login == "github-actions[bot]") | select(.body | startswith("## 🤖 AI Review")) | .id' \
          | while read -r cid; do
              echo "Minimizing old comment $cid"
              gh api graphql -f query="
                mutation {
                  minimizeComment(input: {subjectId: \"$cid\", classifier: OUTDATED}) {
                    minimizedComment { isMinimized }
                  }
                }" 2>/dev/null || true
          done

      # ──────────────────────────────────────────────
      # 4. Agentic AI Review with Tool Use
      # ──────────────────────────────────────────────
      - name: "AI Agent: Review PR"
        id: ai-agent
        env:
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, sys, json, time, subprocess, fnmatch, tempfile, re
          from pathlib import Path
          from openai import OpenAI

          client = OpenAI(
              api_key=os.environ["LITELLM_MASTER_KEY"],
              base_url=os.environ["LITELLM_BASE_URL"],
          )
          MODEL = os.environ["MODEL_NAME"]
          MAX_RETRIES = int(os.environ["MAX_RETRIES"])
          MAX_TOOL_ROUNDS = int(os.environ["MAX_TOOL_ROUNDS"])
          PROTECTED = [p.strip() for p in os.environ.get("PROTECTED_PATTERNS", "").split(",") if p.strip()]
          REPO = os.environ["REPO"]

          with open("/tmp/repo_files.json") as f:
              repo_files = set(json.load(f))
          with open("/tmp/repo_tree.txt") as f:
              repo_tree = f.read()
          with open("/tmp/pr_meta.json") as f:
              pr_meta = json.load(f)
          with open("/tmp/pr_diff.txt") as f:
              pr_diff = f.read()
          with open("/tmp/review_files.json") as f:
              review_files = json.load(f)
          with open("/tmp/skipped_files.json") as f:
              skipped_files = json.load(f)

          pr_title = pr_meta.get("title", "")
          pr_body = pr_meta.get("body", "") or ""

          # Load existing human review comments so agent doesn't duplicate
          existing_comments = []
          try:
              with open("/tmp/existing_review_comments.json") as f:
                  raw = json.load(f)
              for c in raw:
                  if c.get("user", {}).get("login") != "github-actions[bot]":
                      existing_comments.append({
                          "file": c.get("path", ""),
                          "line": c.get("line") or c.get("original_line"),
                          "body": c.get("body", "")[:200],
                      })
          except Exception:
              pass

          # ── Tool definitions ──────────────────────────

          tools = [
              {
                  "type": "function",
                  "function": {
                      "name": "read_file",
                      "description": "Read the full content of a file from the repository, with optional line range. Use this to examine source code, tests, configs, etc.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {"type": "string", "description": "Relative file path from repo root"},
                              "start_line": {"type": "integer", "description": "Optional: 1-based start line"},
                              "end_line": {"type": "integer", "description": "Optional: 1-based end line (inclusive)"}
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "search_codebase",
                      "description": "Search the repository for files containing a regex pattern. Returns matching files with line numbers and context. Use to find callers, usages, definitions, patterns, etc.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "pattern": {"type": "string", "description": "Search pattern (regex)"},
                              "file_glob": {"type": "string", "description": "Optional: glob filter (e.g., '*.py', 'src/**/*.ts')"},
                              "max_results": {"type": "integer", "description": "Max matching files (default 10)"}
                          },
                          "required": ["pattern"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "list_directory",
                      "description": "List files and subdirectories in a directory.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {"type": "string", "description": "Directory path relative to repo root"},
                              "recursive": {"type": "boolean", "description": "List recursively (default false)"}
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "get_file_diff",
                      "description": "Get the PR diff for a specific file, or '*' for the full PR diff.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {"type": "string", "description": "File path, or '*' for full PR diff"}
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "get_git_log",
                      "description": "Get recent git commit history, optionally for a specific file.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "max_commits": {"type": "integer", "description": "Number of commits (default 10)"},
                              "path": {"type": "string", "description": "Optional: file/directory to filter by"}
                          },
                          "required": []
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "get_file_blame",
                      "description": "Get git blame for a file or line range. Shows who last changed each line and when.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {"type": "string", "description": "File path"},
                              "start_line": {"type": "integer", "description": "Optional: start line"},
                              "end_line": {"type": "integer", "description": "Optional: end line"}
                          },
                          "required": ["path"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "check_syntax",
                      "description": "Validate syntax of a code snippet. Supports Python, JSON, YAML. Use before submitting a fix to make sure it's valid.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "code": {"type": "string", "description": "Code to validate"},
                              "language": {"type": "string", "description": "Language: 'python', 'json', 'yaml'"}
                          },
                          "required": ["code", "language"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "submit_review_issue",
                      "description": "Record an issue found during review. Call this for each distinct issue you find. Issues will be compiled into the review comment.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "file": {"type": "string", "description": "File path where the issue is"},
                              "line": {"type": "integer", "description": "Approximate line number in the new file"},
                              "severity": {"type": "string", "enum": ["critical", "warning", "nit"], "description": "critical = security/crash/data-loss, warning = likely bug/bad practice, nit = style/minor"},
                              "description": {"type": "string", "description": "Clear description of the issue"},
                              "suggestion": {"type": "string", "description": "How to fix it, with code if applicable"},
                              "context_evidence": {"type": "string", "description": "What code/file you looked at that revealed this issue"}
                          },
                          "required": ["file", "line", "severity", "description", "suggestion"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "submit_fix",
                      "description": "Submit an auto-fix for a file. Provide the COMPLETE new file content. The fix will be validated before acceptance. Only use for critical issues.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "path": {"type": "string", "description": "File to fix"},
                              "content": {"type": "string", "description": "COMPLETE fixed file content"},
                              "explanation": {"type": "string", "description": "What was wrong and what you changed"},
                              "confidence": {"type": "number", "description": "Confidence this fix is correct (0.0-1.0)"}
                          },
                          "required": ["path", "content", "explanation", "confidence"]
                      }
                  }
              },
              {
                  "type": "function",
                  "function": {
                      "name": "finish_review",
                      "description": "Call when you've completed your review. Provide your final assessment.",
                      "parameters": {
                          "type": "object",
                          "properties": {
                              "overall_summary": {"type": "string", "description": "2-4 sentence executive summary of the PR and your review"},
                              "verdict": {"type": "string", "enum": ["approve", "request_changes", "comment"], "description": "approve = no issues or only nits, request_changes = critical/important issues, comment = suggestions only"},
                              "architecture_notes": {"type": "string", "description": "Any notes on how the changes fit the project architecture (or null)"},
                              "missing_changes": {
                                  "type": "array",
                                  "items": {"type": "string"},
                                  "description": "Files/areas that should have been changed but weren't"
                              },
                              "positive_notes": {
                                  "type": "array",
                                  "items": {"type": "string"},
                                  "description": "Things done well in the PR (be specific)"
                              }
                          },
                          "required": ["overall_summary", "verdict"]
                      }
                  }
              }
          ]

          # ── Tool implementations ──────────────────────

          review_issues = []   # collected via submit_review_issue
          applied_fixes = []   # collected via submit_fix

          def tool_read_file(path, start_line=None, end_line=None):
              if path not in repo_files:
                  matches = [f for f in repo_files if f.endswith("/" + path) or f.endswith(path) or path in f][:8]
                  if matches:
                      return f"File '{path}' not found. Did you mean:\n" + "\n".join(f"  - {m}" for m in matches)
                  return f"File '{path}' not found."
              try:
                  with open(path, "r", errors="ignore") as f:
                      lines = f.readlines()
                  total = len(lines)
                  s = max(0, (start_line or 1) - 1)
                  e = min(total, end_line or total)
                  numbered = [f"{i:4d} | {line.rstrip()}" for i, line in enumerate(lines[s:e], start=s+1)]
                  content = "\n".join(numbered)
                  if len(content) > 60000:
                      content = content[:60000] + "\n... [truncated — use start_line/end_line]"
                  return f"File: {path} ({total} lines, showing {s+1}-{e})\n\n{content}"
              except Exception as e:
                  return f"Error reading '{path}': {e}"

          def tool_search_codebase(pattern, file_glob=None, max_results=10):
              try:
                  cmd = ["grep", "-rn", "-E", pattern, "."]
                  if file_glob:
                      cmd = ["grep", "-rn", f"--include={file_glob}", "-E", pattern, "."]
                  else:
                      cmd.extend([
                          "--include=*.py", "--include=*.ts", "--include=*.tsx",
                          "--include=*.js", "--include=*.jsx", "--include=*.go",
                          "--include=*.java", "--include=*.rs", "--include=*.rb",
                          "--include=*.yaml", "--include=*.yml", "--include=*.json",
                          "--include=*.toml", "--include=*.cfg", "--include=*.sh",
                          "--include=*.md", "--include=*.html", "--include=*.css",
                          "--include=*.sql", "--include=*.graphql"
                      ])
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=15)
                  lines = [l for l in result.stdout.strip().split("\n") if l and not any(
                      skip in l for skip in ["node_modules/", "__pycache__/", ".git/", "dist/", "build/", ".min."])]

                  if not lines:
                      return f"No matches for '{pattern}'" + (f" in {file_glob}" if file_glob else "")

                  by_file = {}
                  for line in lines:
                      parts = line.split(":", 2)
                      if len(parts) >= 3:
                          fp = parts[0].lstrip("./")
                          by_file.setdefault(fp, []).append(f"  L{parts[1]}: {parts[2].strip()}")

                  out = f"Matches in {len(by_file)} file(s):\n\n"
                  for fp, matches in list(by_file.items())[:max_results]:
                      out += f"📄 {fp}:\n" + "\n".join(matches[:10]) + "\n"
                      if len(matches) > 10:
                          out += f"  ... +{len(matches)-10} more\n"
                      out += "\n"
                  if len(by_file) > max_results:
                      out += f"... +{len(by_file)-max_results} more files"
                  return out
              except subprocess.TimeoutExpired:
                  return f"Search timed out. Try a more specific pattern."
              except Exception as e:
                  return f"Search error: {e}"

          def tool_list_directory(path, recursive=False):
              if not os.path.isdir(path):
                  return f"Directory '{path}' not found."
              try:
                  if recursive:
                      entries = []
                      for root, dirs, files in os.walk(path):
                          dirs[:] = [d for d in dirs if not d.startswith(".") and d not in [
                              "node_modules", "__pycache__", "dist", "build"]]
                          for f in files:
                              entries.append(os.path.relpath(os.path.join(root, f), "."))
                      return f"Directory: {path}/ ({len(entries)} files)\n" + "\n".join(sorted(entries)[:200])
                  else:
                      items = sorted(os.listdir(path))
                      lines = []
                      for item in items:
                          full = os.path.join(path, item)
                          if os.path.isdir(full):
                              cnt = sum(1 for _ in os.scandir(full))
                              lines.append(f"📁 {item}/ ({cnt} items)")
                          else:
                              lines.append(f"📄 {item} ({os.path.getsize(full)} bytes)")
                      return f"Directory: {path}/\n" + "\n".join(lines)
              except Exception as e:
                  return f"Error: {e}"

          def tool_get_file_diff(path):
              try:
                  if path == "*":
                      return f"Full PR diff ({len(pr_diff)} chars):\n\n{pr_diff[:80000]}"

                  # Extract this file's chunk from the full diff
                  chunks = {}
                  current_file = None
                  current_lines = []
                  for line in pr_diff.splitlines(keepends=True):
                      if line.startswith("diff --git"):
                          if current_file:
                              chunks[current_file] = "".join(current_lines)
                          parts = line.split(" b/")
                          current_file = parts[-1].strip() if len(parts) > 1 else None
                          current_lines = [line]
                      else:
                          current_lines.append(line)
                  if current_file:
                      chunks[current_file] = "".join(current_lines)

                  if path in chunks:
                      return f"Diff for {path}:\n\n{chunks[path]}"

                  # Try git diff directly
                  result = subprocess.run(
                      ["git", "diff", f"origin/{pr_meta.get('baseRefName', 'main')}...HEAD", "--", path],
                      capture_output=True, text=True, timeout=10)
                  if result.stdout:
                      return f"Diff for {path}:\n\n{result.stdout[:80000]}"
                  return f"No diff found for '{path}'"
              except Exception as e:
                  return f"Error: {e}"

          def tool_get_git_log(max_commits=10, path=None):
              try:
                  cmd = ["git", "log", f"--max-count={max_commits}", "--oneline", "--stat"]
                  if path: cmd.extend(["--", path])
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=10)
                  return f"Git log:\n\n{result.stdout[:10000]}"
              except Exception as e:
                  return f"Error: {e}"

          def tool_get_file_blame(path, start_line=None, end_line=None):
              if not os.path.isfile(path):
                  return f"File '{path}' not found."
              try:
                  cmd = ["git", "blame", "--line-porcelain"]
                  if start_line and end_line:
                      cmd.extend([f"-L{start_line},{end_line}"])
                  cmd.append(path)
                  result = subprocess.run(cmd, capture_output=True, text=True, timeout=15)

                  # Parse porcelain into readable format
                  lines = []
                  current = {}
                  for raw_line in result.stdout.splitlines():
                      if raw_line.startswith("\t"):
                          code = raw_line[1:]
                          author = current.get("author", "?")
                          date = current.get("author-time", "?")
                          commit = current.get("commit", "?")[:8]
                          lines.append(f"{commit} ({author}) | {code}")
                          current = {}
                      elif " " in raw_line:
                          parts = raw_line.split(" ", 1)
                          if len(parts) == 2:
                              key, val = parts
                              if key in ("author", "author-time", "summary"):
                                  current[key] = val
                              elif len(key) == 40:
                                  current["commit"] = key

                  if not lines:
                      return f"No blame data for '{path}'"
                  output = "\n".join(lines[:200])
                  if len(lines) > 200:
                      output += f"\n... +{len(lines)-200} more lines"
                  return f"Blame for {path}:\n\n{output}"
              except Exception as e:
                  return f"Error: {e}"

          def tool_check_syntax(code, language):
              if language == "python":
                  try:
                      import ast
                      ast.parse(code)
                      return "✅ Valid Python syntax."
                  except SyntaxError as e:
                      return f"❌ Python syntax error at line {e.lineno}: {e.msg}"
              elif language == "json":
                  try:
                      json.loads(code)
                      return "✅ Valid JSON."
                  except json.JSONDecodeError as e:
                      return f"❌ JSON error at line {e.lineno}: {e.msg}"
              elif language == "yaml":
                  try:
                      import importlib
                      yaml = importlib.import_module("yaml")
                      yaml.safe_load(code)
                      return "✅ Valid YAML."
                  except Exception as e:
                      return f"❌ YAML error: {e}"
              else:
                  return f"Syntax checking not supported for '{language}'. Supported: python, json, yaml"

          def tool_submit_review_issue(file, line, severity, description, suggestion, context_evidence=None):
              issue = {
                  "file": file,
                  "line": line,
                  "severity": severity,
                  "description": description,
                  "suggestion": suggestion,
                  "context_evidence": context_evidence,
              }
              review_issues.append(issue)
              return f"✅ Recorded {severity} issue on {file}:{line}. Total issues so far: {len(review_issues)}"

          def tool_submit_fix(path, content, explanation, confidence):
              if any(fnmatch.fnmatch(path, pat) for pat in PROTECTED):
                  return f"REJECTED: '{path}' is protected."
              if not os.path.isfile(path):
                  return f"REJECTED: '{path}' not found."
              if confidence < 0.6:
                  return f"REJECTED: Confidence {confidence} below 0.6 threshold for auto-fix. Record as a review issue instead with submit_review_issue."

              with open(path) as f:
                  original = f.read()

              ratio = len(content) / max(len(original), 1)
              if ratio < 0.3 or ratio > 3.0:
                  return f"REJECTED: Size ratio {ratio:.2f} suspicious (orig: {len(original)}, fix: {len(content)})"

              orig_lines = len(original.splitlines())
              fix_lines = len(content.splitlines())
              if orig_lines > 10 and fix_lines < orig_lines * 0.3:
                  return f"REJECTED: Line count {orig_lines} → {fix_lines}, too much deletion."

              ext = Path(path).suffix
              if ext == ".py":
                  try:
                      import ast
                      ast.parse(content)
                  except SyntaxError as e:
                      return f"REJECTED: Python syntax error: line {e.lineno}: {e.msg}"
              elif ext == ".json":
                  try:
                      json.loads(content)
                  except json.JSONDecodeError as e:
                      return f"REJECTED: Invalid JSON: {e}"

              # Generate diff
              with tempfile.NamedTemporaryFile(mode="w", suffix=".orig", delete=False) as tmp:
                  tmp.write(original)
                  tmp_path = tmp.name
              diff_result = subprocess.run(
                  ["diff", "-u", "--label", f"a/{path}", tmp_path, "--label", f"b/{path}", "-"],
                  input=content, capture_output=True, text=True)
              os.unlink(tmp_path)

              with open(path, "w") as f:
                  f.write(content)
              subprocess.run(["git", "add", path], check=True)

              applied_fixes.append({
                  "file": path,
                  "explanation": explanation,
                  "confidence": confidence,
                  "diff": diff_result.stdout[:5000],
              })

              return f"ACCEPTED: Fix applied to '{path}'.\n\nDiff:\n{diff_result.stdout[:3000]}"

          # ── Build seed prompt ──────────────────────

          # Truncate diff for seed — the model can always request more via get_file_diff
          seed_diff = pr_diff
          if len(seed_diff) > 30000:
              seed_diff = seed_diff[:15000] + "\n\n... [diff truncated — use get_file_diff to see specific files]\n\n" + seed_diff[-15000:]

          # Existing human comments
          human_comments_str = ""
          if existing_comments:
              human_comments_str = "\n\n## Existing Human Review Comments (don't repeat these):\n"
              for c in existing_comments[:20]:
                  human_comments_str += f"- {c['file']}:{c.get('line', '?')}: {c['body']}\n"

          system_prompt = f"""You are a senior staff engineer performing a thorough code review of a pull request.

You have access to the ENTIRE repository through tools. Use them to understand context.

## Your approach:

1. **Read the PR diff** to understand what changed at a high level.
2. **For each changed file**, read the FULL file (not just the diff) to understand context.
3. **Follow dependencies**: If a changed file imports something or is called by something, read those files too.
   Use search_codebase to find callers, usages, and related code.
4. **Check for breaking changes**: If a function signature, API, type, or interface changed,
   search for all callers to verify they're updated.
5. **Check for missing changes**: Are there test files, docs, configs, or related files
   that should have been updated but weren't?
6. **Record issues**: Use submit_review_issue for each problem you find.
7. **Auto-fix critical issues**: If you find critical issues (security, crashes, data loss)
   AND you're confident in the fix, use submit_fix.
8. **Finish**: Call finish_review with your overall assessment.

## Review focus areas:
- **Correctness**: Logic bugs, edge cases, null handling, off-by-one errors
- **Security**: Injection, XSS, auth bypass, secrets exposure, input validation
- **Compatibility**: Do changes break callers? Are interfaces still consistent?
- **Completeness**: Missing tests, missing error handling, missing docs
- **Performance**: N+1 queries, unnecessary computation, memory leaks
- **Conventions**: Does the code follow patterns established elsewhere in the repo?

## Rules:
- ALWAYS read files before commenting on them. Don't assume — verify.
- Be specific: reference actual line numbers and code.
- Don't repeat issues already flagged in existing human review comments.
- Praise good code too — note what's done well.
- Only auto-fix CRITICAL issues. Everything else should be a review issue.
- When in doubt, search_codebase to check your assumptions.

## Repository structure:
```
{repo_tree[:6000]}
```
"""

          user_message = f"""Please review this Pull Request.

## PR Title: {pr_title}

## PR Description:
{pr_body[:4000] if pr_body else "(no description provided)"}

## Changed Files ({len(review_files)} to review, {len(skipped_files)} skipped):
{chr(10).join('- ' + f for f in review_files)}
{chr(10).join('- [skipped] ' + f for f in skipped_files) if skipped_files else ""}

## PR Diff:
```diff
{seed_diff}
```
{human_comments_str}

Start by reading the diff, then examine each changed file in full context.
Use search_codebase to verify that changes don't break callers."""

          # ── Agent loop ──────────────────────────────

          print("═" * 60)
          print("Starting AI review agent")
          print(f"Files to review: {review_files}")
          print("═" * 60)

          messages = [
              {"role": "system", "content": system_prompt},
              {"role": "user", "content": user_message},
          ]

          agent_finished = False
          finish_data = {}
          tool_round = 0

          TOOL_DISPATCH = {
              "read_file": lambda a: tool_read_file(a["path"], a.get("start_line"), a.get("end_line")),
              "search_codebase": lambda a: tool_search_codebase(a["pattern"], a.get("file_glob"), a.get("max_results", 10)),
              "list_directory": lambda a: tool_list_directory(a["path"], a.get("recursive", False)),
              "get_file_diff": lambda a: tool_get_file_diff(a["path"]),
              "get_git_log": lambda a: tool_get_git_log(a.get("max_commits", 10), a.get("path")),
              "get_file_blame": lambda a: tool_get_file_blame(a["path"], a.get("start_line"), a.get("end_line")),
              "check_syntax": lambda a: tool_check_syntax(a["code"], a["language"]),
              "submit_review_issue": lambda a: tool_submit_review_issue(a["file"], a["line"], a["severity"], a["description"], a["suggestion"], a.get("context_evidence")),
              "submit_fix": lambda a: tool_submit_fix(a["path"], a["content"], a["explanation"], a.get("confidence", 0.8)),
              "finish_review": None,
          }

          while tool_round < MAX_TOOL_ROUNDS and not agent_finished:
              tool_round += 1
              print(f"\n── Round {tool_round}/{MAX_TOOL_ROUNDS} ──")

              response = None
              for attempt in range(MAX_RETRIES + 1):
                  try:
                      response = client.chat.completions.create(
                          model=MODEL,
                          messages=messages,
                          tools=tools,
                          tool_choice="auto",
                          temperature=0.1,
                          max_tokens=8000,
                      )
                      break
                  except Exception as e:
                      print(f"  API error ({attempt+1}): {e}")
                      time.sleep(2 ** (attempt + 1))

              if response is None:
                  print("API failed, stopping agent")
                  break

              msg = response.choices[0].message
              messages.append(msg)

              if not msg.tool_calls:
                  print(f"  Text: {(msg.content or '')[:200]}")
                  if tool_round > 5:
                      break
                  continue

              for tc in msg.tool_calls:
                  fn_name = tc.function.name
                  try:
                      fn_args = json.loads(tc.function.arguments)
                  except json.JSONDecodeError:
                      fn_args = {}

                  # Compact log
                  args_preview = json.dumps(fn_args)
                  if len(args_preview) > 200:
                      args_preview = args_preview[:200] + "..."
                  print(f"  🔧 {fn_name}({args_preview})")

                  if fn_name == "finish_review":
                      agent_finished = True
                      finish_data = fn_args
                      tool_result = "Review finished."
                      print(f"  ✅ Review complete: {fn_args.get('verdict', '?')}")
                  elif fn_name in TOOL_DISPATCH:
                      try:
                          tool_result = TOOL_DISPATCH[fn_name](fn_args)
                      except Exception as e:
                          tool_result = f"Tool error: {e}"
                      if len(tool_result) > 60000:
                          tool_result = tool_result[:60000] + "\n... [truncated]"
                      print(f"    → {len(tool_result)} chars")
                  else:
                      tool_result = f"Unknown tool: {fn_name}"

                  messages.append({
                      "role": "tool",
                      "tool_call_id": tc.id,
                      "content": tool_result,
                  })

          if not agent_finished:
              print("Agent didn't finish — using collected data")
              finish_data = {
                  "overall_summary": "Review incomplete (agent hit round limit).",
                  "verdict": "comment",
              }

          # ── Determine decision ──
          verdict = finish_data.get("verdict", "comment")
          critical_count = sum(1 for i in review_issues if i["severity"] == "critical")
          warning_count = sum(1 for i in review_issues if i["severity"] == "warning")

          if applied_fixes:
              decision = "FIX"
          elif verdict == "approve" and critical_count == 0:
              decision = "APPROVE"
          elif verdict == "request_changes" or critical_count > 0:
              decision = "REQUEST_CHANGES"
          else:
              decision = "COMMENT"

          confidence = 0.9 if agent_finished else 0.5

          result = {
              "decision": decision,
              "confidence": confidence,
              "verdict": verdict,
              "finish": finish_data,
              "issues": review_issues,
              "fixes": applied_fixes,
              "tool_rounds": tool_round,
              "agent_finished": agent_finished,
              "stats": {
                  "files_reviewed": len(review_files),
                  "files_skipped": len(skipped_files),
                  "critical": critical_count,
                  "warnings": warning_count,
                  "nits": sum(1 for i in review_issues if i["severity"] == "nit"),
                  "total_issues": len(review_issues),
                  "fixes_applied": len(applied_fixes),
              }
          }

          with open("/tmp/review_result.json", "w") as f:
              json.dump(result, f, indent=2)

          print(f"\n{'═' * 60}")
          print(f"Decision: {decision} | Verdict: {verdict}")
          print(f"Issues: {critical_count} critical, {warning_count} warnings, {len(review_issues)} total")
          print(f"Fixes: {len(applied_fixes)} | Rounds: {tool_round}")
          print(f"{'═' * 60}")
          PYEOF

      # ──────────────────────────────────────────────
      # 5. Commit auto-fixes
      # ──────────────────────────────────────────────
      - name: Commit Auto-Fixes
        id: commit
        run: |
          if git diff --cached --quiet; then
              echo "No fixes to commit"
              echo "committed=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 << 'PYEOF'
          import json
          with open("/tmp/review_result.json") as f:
              result = json.load(f)

          fixes = result.get("fixes", [])
          msg = "🤖 AI Review Auto-Fix: critical issues\n\n"
          for fix in fixes:
              msg += f"- {fix['file']}: {fix['explanation'][:100]}\n"
          msg += "\nModel: gpt-5.3-chat via LiteLLM (agentic review)\n"
          msg += "⚠️ Auto-generated — please verify"

          with open("/tmp/commit_msg.txt", "w") as f:
              f.write(msg)
          PYEOF

          git commit -F /tmp/commit_msg.txt
          git push origin "HEAD:${{ github.head_ref }}"
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "Auto-fixes pushed"

      # ──────────────────────────────────────────────
      # 6. Post review comment + formal GH review
      # ──────────────────────────────────────────────
      - name: Post Review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMITTED: ${{ steps.commit.outputs.committed }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess

          pr_number = os.environ["PR_NUMBER"]
          repo = os.environ["REPO"]
          committed = os.environ.get("COMMITTED", "false") == "true"

          with open("/tmp/review_result.json") as f:
              result = json.load(f)

          decision = result.get("decision", "COMMENT")
          confidence = result.get("confidence", 0)
          finish = result.get("finish", {})
          issues = result.get("issues", [])
          fixes = result.get("fixes", [])
          stats = result.get("stats", {})
          rounds = result.get("tool_rounds", 0)

          sev_icons = {"critical": "🔴", "warning": "🟡", "nit": "🔵"}
          dec_icons = {"FIX": "🔧", "APPROVE": "✅", "REQUEST_CHANGES": "⛔", "COMMENT": "💬"}
          dec_labels = {"FIX": "Auto-Fixed", "APPROVE": "Approved", "REQUEST_CHANGES": "Changes Requested", "COMMENT": "Suggestions"}
          conf_icon = "🟢" if confidence >= 0.8 else "🟡" if confidence >= 0.5 else "🔴"

          lines = []

          # Header
          lines.append(f"## 🤖 AI Review — {dec_icons.get(decision, '📝')} {dec_labels.get(decision, decision)}")
          lines.append("")
          lines.append(f"**Model**: `gpt-5.3-chat` via LiteLLM (agentic) &nbsp;|&nbsp; "
                       f"**Confidence**: {conf_icon} {confidence:.0%} &nbsp;|&nbsp; "
                       f"**Rounds**: {rounds}")
          lines.append("")

          # Summary
          lines.append("### 📋 Summary")
          lines.append(finish.get("overall_summary", "No summary available."))
          lines.append("")

          if finish.get("architecture_notes"):
              lines.append(f"**🏗 Architecture**: {finish['architecture_notes']}")
              lines.append("")

          # Positive notes
          positives = finish.get("positive_notes", [])
          if positives:
              lines.append("### 👍 What's Good")
              for p in positives:
                  lines.append(f"- {p}")
              lines.append("")

          # Missing changes
          missing = finish.get("missing_changes", [])
          if missing:
              lines.append("### ⚠️ Potentially Missing Changes")
              for m in missing:
                  lines.append(f"- {m}")
              lines.append("")

          # Stats
          lines.append("### 📊 Stats")
          lines.append("| Reviewed | Skipped | Critical | Warnings | Nits | Fixes |")
          lines.append("|:-:|:-:|:-:|:-:|:-:|:-:|")
          lines.append(f"| {stats.get('files_reviewed',0)} | {stats.get('files_skipped',0)} | "
                       f"{stats.get('critical',0)} | {stats.get('warnings',0)} | "
                       f"{stats.get('nits',0)} | {stats.get('fixes_applied',0)} |")
          lines.append("")

          # Issues by file
          if issues:
              lines.append(f"### 🔍 Issues ({len(issues)})")
              lines.append("")

              by_file = {}
              for iss in issues:
                  by_file.setdefault(iss["file"], []).append(iss)

              for filepath, file_issues in sorted(by_file.items()):
                  crits = sum(1 for i in file_issues if i["severity"] == "critical")
                  warns = sum(1 for i in file_issues if i["severity"] == "warning")
                  nits = sum(1 for i in file_issues if i["severity"] == "nit")
                  badge = ""
                  if crits: badge += f" 🔴×{crits}"
                  if warns: badge += f" 🟡×{warns}"
                  if nits: badge += f" 🔵×{nits}"

                  lines.append("<details>")
                  lines.append(f"<summary><strong>{filepath}</strong>{badge}</summary>")
                  lines.append("")

                  for iss in sorted(file_issues, key=lambda x: {"critical": 0, "warning": 1, "nit": 2}[x["severity"]]):
                      icon = sev_icons[iss["severity"]]
                      lines.append(f"- {icon} **[{iss['severity'].upper()}]** Line {iss.get('line', '?')}: {iss['description']}")
                      if iss.get("suggestion"):
                          lines.append(f"  > 💡 {iss['suggestion']}")
                      if iss.get("context_evidence"):
                          lines.append(f"  > 📎 *Evidence: {iss['context_evidence'][:200]}*")
                      lines.append("")

                  lines.append("</details>")
                  lines.append("")

          # Fixes
          if fixes:
              lines.append(f"### 🔧 Auto-Fixes Applied ({len(fixes)})")
              lines.append("")
              for fix in fixes:
                  lines.append("<details>")
                  lines.append(f"<summary><strong>{fix['file']}</strong> — {fix['explanation'][:100]}</summary>")
                  lines.append("")
                  diff = fix.get("diff", "")
                  if diff:
                      lines.append("```diff")
                      lines.append(diff[:3000])
                      lines.append("```")
                  lines.append("")
                  lines.append("</details>")
                  lines.append("")

              if committed:
                  lines.append("> 🔧 **Auto-fix commit pushed.** Please review the changes.")
              lines.append("")

          # Clean files
          reviewed = set(i["file"] for i in issues) | set(f["file"] for f in fixes)
          clean = [f for f in json.load(open("/tmp/review_files.json")) if f not in reviewed]
          if clean:
              lines.append("<details>")
              lines.append(f"<summary>✅ <strong>{len(clean)} file(s)</strong> with no issues</summary>")
              lines.append("")
              for f in clean:
                  lines.append(f"- {f}")
              lines.append("")
              lines.append("</details>")
              lines.append("")

          lines.append("---")
          lines.append("*Generated by AI PR Reviewer v4 (agentic tool-use) • re-trigger by pushing a new commit*")

          body = "\n".join(lines)

          with open("/tmp/comment.md", "w") as f:
              f.write(body)

          # Post comment
          subprocess.run([
              "gh", "pr", "comment", pr_number,
              "--repo", repo,
              "--body-file", "/tmp/comment.md",
          ], check=True)
          print(f"Comment posted ({len(body)} chars)")

          # Submit formal GH review
          if decision == "APPROVE":
              subprocess.run([
                  "gh", "pr", "review", pr_number, "--repo", repo, "--approve",
                  "--body", "🤖 AI review (agentic): no critical issues. Approved.",
              ], check=False)
          elif decision in ("REQUEST_CHANGES", "FIX"):
